    <div align="center">

    <h2>Registrate para comprar y recibir ofertas exclusivas</h2>
    
     <form>

        <label>Nombre</label><br><br>
        <input type="text" placeholder="Ingrese un nombre"required><br><br>
        
        <label>Apellidos</label><br><br>
        <input type="text" placeholder="Ingresa Apellidos"required><br><br>
        
        <label>Ciudad</label><br>
        <select required><br>
            <option >Seleccione una ciudad</option>
            <option>Lima</option>
            <option>Arequipa</option>
            <option>Trujillo</option>
        </select> <br><br>
        
        <label>Correo electronico</label><br><br>
        <input type="email" placeholder="Ingresa un correo electronico" required><br><br>
        
        <label>Contraseña</label><br><br>
        <input type="password" placeholder="Ingrese contraseña"required><br><br>
        
        <label> Acepta los terminos y condiciones</label>
        <input type="checkbox" required><br>
        
        <label>Desea que se le envie a su correo sobre nuestras promociones y más (opcional)</label>
        <input type="checkbox"><br><br>
       
        <input type="submit" value="Registrarse">

     </form>
